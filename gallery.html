<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Dilip Shrestha</title>
    <meta name="description"
        content="Photo gallery and recognitions of Dilip Shrestha's counseling and community work.">
    <link rel="shortcut icon" href="image/logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="site-header">
        <nav class="container nav-wrap">
            <a class="brand" href="/">Dilip Shrestha</a>
            <button class="menu-btn" id="menu-btn" aria-label="Toggle navigation" aria-expanded="false">
                <i class="fas fa-bars"></i>
            </button>
            <ul id="nav-links" class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/service">Services</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/gallery" class="active">Gallery</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-hero">
            <div class="container">
                <p class="eyebrow">Gallery</p>
                <h1>Moments from Professional and Community Work</h1>
                <p class="lead">Selected photos from events, trainings, and public mental health programs.</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <h2 class="section-title">Photo Gallery</h2>
                <div class="gallery-grid">
                    <img src="image/1.jpg" alt="Gallery photo 1">
                    <img src="image/2.jpg" alt="Gallery photo 2">
                    <img src="image/3.jpg" alt="Gallery photo 3">
                    <img src="image/4.jpg" alt="Gallery photo 4">
                    <img src="image/5.jpg" alt="Gallery photo 5">
                    <img src="image/6.jpg" alt="Gallery photo 6">
                    <img src="image/7.jpg" alt="Gallery photo 7">
                    <img src="image/8.jpg" alt="Gallery photo 8">
                    <img src="image/9.jpg" alt="Gallery photo 9">
                    <img src="image/10.jpg" alt="Gallery photo 10">
                    <img src="image/11.jpg" alt="Gallery photo 11">
                    <img src="image/12.jpg" alt="Gallery photo 12">
                </div>
            </div>
        </section>

        <section class="section section-soft">
            <div class="container">
                <h2 class="section-title">Karate Dan Rankings</h2>
                <div class="cards-grid two-up">
                    <article class="media-card">
                        <img src="image/2nd dan.jpg" alt="2nd Dan certification">
                        <h3>2nd Dan</h3>
                    </article>
                    <article class="media-card">
                        <img src="image/3rd dan.jpg" alt="3rd Dan certification">
                        <h3>3rd Dan</h3>
                    </article>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="script.js"></script>
</body>

</html>
